<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Generate a custom chessboard and visualize every valid bishop move interactively."
    >

    <title>Bishop Chessboard Visualizer</title>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- css -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <!-- application -->
    <main class="app">

        <!-- header -->
        <header class="header">

            <!-- logo -->
            <div
                class="logo"
                aria-hidden="true"
            >
                ♗
            </div>

            <!-- header content -->
            <div class="header-content">
                <h1 class="title">
                    Bishop Chessboard Visualizer
                </h1>

                <p class="description">
                    Generate a custom chessboard, select any square, and instantly
                    visualize every valid bishop move.
                </p>
            </div>
        </header>

        <!-- controls -->
        <section
            class="controls"
            aria-label="Chessboard controls"
        >

            <!-- board size input -->
            <div class="board-size">
                <label for="board-size-input">
                    Board Size
                </label>

                <input
                    type="number"
                    id="board-size-input"
                    name="board-size"
                    value="8"
                    min="4"
                    max="16"
                    step="1"
                    inputmode="numeric"
                    aria-describedby="board-size-hint"
                >

                <small id="board-size-hint">
                    Choose a size from 4 to 16.
                </small>
            </div>

            <!-- generate button -->
            <button
                type="button"
                id="generate-board"
            >
                Generate Board
            </button>

            <!-- reset button -->
            <button
                type="button"
                id="reset-board"
            >
                Reset
            </button>
        </section>

        <!-- information -->
        <section
            class="stats"
            aria-label="Board information"
        >

            <!-- current board size -->
            <div class="info-chip">
                <span>Board</span>

                <strong
                    id="current-board"
                    aria-live="polite"
                >
                    8 × 8
                </strong>
            </div>

            <!-- selected square -->
            <div class="info-chip">
                <span>Selected</span>

                <strong
                    id="selected-square"
                    aria-live="polite"
                >
                    —
                </strong>
            </div>

            <!-- possible moves -->
            <div class="info-chip">
                <span>Moves</span>

                <strong
                    id="possible-moves"
                    aria-live="polite"
                >
                    0
                </strong>
            </div>
        </section>

        <!-- chess board -->
        <section
            class="board-section"
            aria-label="Bishop move visualizer"
        >
            <div class="board-container">
                <div
                    id="chessboard"
                    class="chessboard"
                    role="grid"
                    aria-label="Interactive bishop chessboard"
                ></div>
            </div>
        </section>
    </main>

    <!-- javascript -->
    <script
        src="script.js"
        defer
    ></script>

</body>

</html>
